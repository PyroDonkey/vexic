name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Secret scan (full history)
        run: gitleaks git . --log-opts="--all" --redact --verbose
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.13
      - name: Check Python annotations
        run: uv run ruff check --select ANN --ignore ANN401 .
      - name: Check docs ASCII
        run: uv run python scripts/check_docs_ascii.py docs
      - name: Check doc drift
        run: uv run python scripts/check_doc_drift.py --ci
      - name: Run tests
        run: uv run pytest
