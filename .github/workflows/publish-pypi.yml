name: Publish PyPI

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example v0.1.0
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v') && github.ref_name == inputs.release_tag
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv
        # Exact pin required: setup-uv stopped publishing floating major tags after v7
        # (no @v8 exists upstream; @v8 fails at workflow parse time).
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Set up Python
        run: uv python install 3.13
      - name: Verify release tag
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: uv run python scripts/check_release_tag.py
      - name: Build
        run: uv build --sdist --wheel --out-dir dist --clear
      - name: Publish
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/ dist/*
