# Hourly producer for the summarize dream phase (COA-254 D5).
#
# The trigger endpoint owns all logic: dedup (in-flight lock), rate limiting
# (6/hour), and daily span budget. Firing this workflow is idempotent --
# redundant/overlapping fires just get a `skipped: already_running` 202 or a
# 429, never double work. This workflow stays deliberately dumb: no matrix,
# no retry logic beyond curl's own, no per-tenant looping.
#
# Agent scoping is exact, not "all agents": `list_compactable_session_ids`
# matches sessions with `agent_id IS ?`. Omitting `X-Vexic-Agent-Id` (the
# default here) sweeps only sessions recorded with a NULL agent_id. Set the
# `VEXIC_DREAM_AGENT_ID` secret to the exact agent id the recorder writes
# transcripts under if this tenant's sessions are agent-scoped -- otherwise
# this cron sweep will silently never touch them. An unset/empty secret
# means "omit the header entirely" (NULL-agent sweep), not "all agents".
#
# Non-2xx (e.g. 429, 5xx) fails the job red on purpose: that's the intended
# v1 alerting signal, so no retries are layered on top beyond curl --retry.
name: dream-cron

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch: {} # hand-testing

# In a public fork/clone without the VEXIC_DREAM_* secrets configured, the
# hourly schedule would otherwise fire and fail red every hour. Gate the job on
# a repo/environment variable so an unconfigured repo skips cleanly (a skipped
# job reports neutral/success, never a red failure). Set the `VEXIC_DREAM_ENABLED`
# repository variable to `true` alongside the VEXIC_DREAM_* secrets to arm the
# sweep. `workflow_dispatch` bypasses the gate so the job can be hand-tested
# with secrets before arming the hourly schedule.
jobs:
  trigger-summarize:
    if: github.event_name == 'workflow_dispatch' || vars.VEXIC_DREAM_ENABLED == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger summarize dream phase
        env:
          VEXIC_DREAM_AGENT_ID: ${{ secrets.VEXIC_DREAM_AGENT_ID }}
        run: |
          args=(
            --fail-with-body --max-time 30 --retry 2
            -X POST "${{ secrets.VEXIC_DREAM_TRIGGER_URL }}"
            -H "Authorization: Bearer ${{ secrets.VEXIC_DREAM_TRIGGER_KEY }}"
            -H "X-Vexic-Project-Id: ${{ secrets.VEXIC_DREAM_PROJECT_ID }}"
            -H "Content-Type: application/json"
          )
          if [ -n "$VEXIC_DREAM_AGENT_ID" ]; then
            args+=(-H "X-Vexic-Agent-Id: $VEXIC_DREAM_AGENT_ID")
          fi
          args+=(-d '{"phase": "summarize"}')
          curl "${args[@]}"
