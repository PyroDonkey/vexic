# Hourly producer for the summarize dream phase (COA-254 D5).
#
# The trigger endpoint owns all logic: dedup (in-flight lock), rate limiting
# (6/hour), and daily span budget. Firing this workflow is idempotent --
# redundant/overlapping fires just get a `skipped: already_running` 202 or a
# 429, never double work. This workflow stays deliberately dumb: no matrix,
# no retry logic beyond curl's own, no per-tenant looping.
#
# X-Vexic-Session-Id is required by the endpoint for auth binding, but the
# summarize sweep itself is tenant(+agent)-wide regardless of which session
# id is sent -- "cron" is a fixed placeholder, not a real session.
#
# Non-2xx (e.g. 429, 5xx) fails the job red on purpose: that's the intended
# v1 alerting signal, so no retries are layered on top beyond curl --retry.
name: dream-cron

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch: {} # hand-testing

jobs:
  trigger-summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger summarize dream phase
        run: |
          curl --fail-with-body --max-time 30 --retry 2 \
            -X POST "${{ secrets.VEXIC_DREAM_TRIGGER_URL }}" \
            -H "Authorization: Bearer ${{ secrets.VEXIC_DREAM_TRIGGER_KEY }}" \
            -H "X-Vexic-Project-Id: ${{ secrets.VEXIC_DREAM_PROJECT_ID }}" \
            -H "X-Vexic-Session-Id: cron" \
            -H "Content-Type: application/json" \
            -d '{"phase": "summarize"}'
