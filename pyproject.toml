[project]
name = "vexic"
version = "0.1.0"
description = "Provenance-first memory core for long-running agents."
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "pydantic-ai==1.84.1",
    "sqlite-vec>=0.1.9",
]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]

[tool.pytest.ini_options]
pythonpath = ["src"]
